# uniple checkout — Shopify app (= JPYC Manual Payment + email App Proxy pay link)
# Email-only design: customer payment entry is the Order confirmation email
# Liquid snippet. No Shopify UI extensions are shipped.
client_id = "cdf36943d96d6284bdfa212ee9801b45"
name = "uniple checkout"
handle = "uniple-checkout"
application_url = "https://shopify.uniple.io"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "uniple-dev.myshopify.com"

[access_scopes]
# Manual Payment + orderMarkAsPaid に必要な最小 scope。
# - read_orders: order detail 取得 (= shop admin 経由 webhook + uniple session 作成時)
# - write_orders: orderMarkAsPaid mutation (= uniple webhook completed 受信時)
# write_checkouts は deprecated のため不採用、 read_products は first smoke 後に判断。
scopes = "read_orders,write_orders"

[auth]
redirect_urls = [
  "https://shopify.uniple.io/auth/callback",
  "https://shopify.uniple.io/auth/shopify/callback",
  "https://shopify.uniple.io/api/auth/callback"
]

[webhooks]
api_version = "2025-10"

  # Mandatory app lifecycle
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  # Protected customer data access is managed from Partner Dashboard.
  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks/orders/cancelled"

  # Mandatory compliance webhooks (= enable before public app submission if required)
  # [[webhooks.subscriptions]]
  # uri = "/webhooks/customers/data_request"
  # compliance_topics = ["customers/data_request"]

[pos]
embedded = false

# 注文確認 email の Liquid snippet が App Proxy `/apps/uniple-pay-link?orderId=<gid>` を
# customer click 経由で叩く唯一の payment entry。
# Shopify が HMAC `signature` query param を付加、 plugin endpoint で検証。
[app_proxy]
url = "https://shopify.uniple.io/apps/uniple-pay-link"
subpath = "uniple-pay-link"
prefix = "apps"
